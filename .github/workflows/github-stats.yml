name: Update GitHub Stats Images

on:
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-github-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secret
        env:
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: |
          if [ -z "${GH_STATS_TOKEN}" ]; then
            echo "::error::Missing required secret GH_STATS_TOKEN."
            echo "::error::Create it at Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Clone pinned stats generator
        run: |
          rm -rf /tmp/github-language-stats-src
          git clone --depth 1 https://github.com/Connor9994/GitHub-Language-Stats.git /tmp/github-language-stats-src
          cd /tmp/github-language-stats-src
          git fetch --depth 1 origin 30192046390884d003729121a02e755a68498441
          git checkout 30192046390884d003729121a02e755a68498441

      - name: Install generator dependencies
        working-directory: /tmp/github-language-stats-src
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Generate stats images (public-only)
        working-directory: /tmp/github-language-stats-src
        env:
          ACCESS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
          GITHUB_ACTOR: pypi-ahmad
          EXCLUDED: ${{ secrets.GH_STATS_EXCLUDE_REPOS }}
          EXCLUDED_LANGS: ${{ secrets.GH_STATS_EXCLUDE_LANGS }}
          EXCLUDE_FORKED_REPOS: "true"
        run: |
          python3 --version
          python3 generate_images.py

      - name: Publish images to generated branch
        run: |
          set -euo pipefail

          test -f /tmp/github-language-stats-src/generated/overview.svg
          test -f /tmp/github-language-stats-src/generated/languages.svg

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin generated >/dev/null 2>&1; then
            git fetch origin generated
            git checkout -B generated origin/generated
          else
            git checkout --orphan generated
          fi

          git rm -rf . >/dev/null 2>&1 || true
          cp /tmp/github-language-stats-src/generated/overview.svg ./overview.svg
          cp /tmp/github-language-stats-src/generated/languages.svg ./languages.svg
          git add overview.svg languages.svg

          if git diff --cached --quiet; then
            echo "No changes in generated stats images."
            exit 0
          fi

          git commit -m "Update GitHub stats images"
          git push --set-upstream origin generated
